<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voorloop</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        h1 {
            font-size: 2rem;
            color: #1a1a1a;
            margin-bottom: 20px;
        }

        p {
            color: #555;
            font-size: 1rem;
            margin-bottom: 12px;
        }

        a {
            color: #2563eb;
            text-decoration: none;
            font-size: 1rem;
        }

        a:hover {
            text-decoration: underline;
        }

        footer {
            padding: 24px;
            color: #999;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <main>
        <h1>Contact Voorloop</h1>
        <p>For app support, feature suggestions, or questions, please email:</p>
        <a href="mailto:applestore@voorloop.com">applestore@voorloop.com</a>
    </main>
    <footer>&copy; 2026 Voorloop</footer>
</body>
</html>
